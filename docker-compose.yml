# ============================================
# AIVersus - Docker Compose
# ============================================
# Just run:  docker compose up --build
#
# To set your Gemini API key, either:
#   1. Create a .env file:  echo "GEMINI_API_KEY=your_key" > .env
#   2. Or pass it inline:   GEMINI_API_KEY=your_key docker compose up --build
# ============================================

services:
  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aiversus_db_pass
      POSTGRES_DB: aiversus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d aiversus" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Flask Application ----
  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Database config (points to the 'db' container above)
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: aiversus_db_pass
      DB_NAME: aiversus
      # API Key — override via .env file or CLI:
      #   GEMINI_API_KEY=xxx docker compose up
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
